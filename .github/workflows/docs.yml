name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y graphviz

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install git+https://github.com/petercorke/sphinx-autorun.git
          pip install .[docs]
          cd mvtb-data && pip install .

      - name: Build docs
        run: sphinx-build -b html docs/source docs/build/html

      - name: Build wheel for JupyterLite
        run: |
          pip install build
          python -m build --wheel --outdir lite/pypi

      - name: Build JupyterLite site
        run: |
          pip install jupyterlite-core jupyterlite-pyodide-kernel jupyter-server ipympl
          cd lite && jupyter lite build --output-dir ../docs/build/html/lite

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
