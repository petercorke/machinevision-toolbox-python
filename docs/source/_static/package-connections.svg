             font-family="Avenir"
             font-size="12"
             font-weight="bold"
             font-style="normal">
<tspan x="586.085487289" y="195.640388827">Downstream integration:</tspan><tspan x="586.085487289" y="211.640388827" font-weight="normal">- </tspan><tspan>Pytorch</tspan><tspan font-weight="normal">&#x20;tensors (for deep&#x20;</tspan><tspan x="586.085487289" y="227.640388827" font-weight="normal">  learning)</tspan><tspan x="586.085487289" y="243.640388827" font-weight="normal">- </tspan><tspan>ROS</tspan><tspan font-weight="normal">&#x20;topics (for robot &#x20;</tspan><tspan x="586.085487289" y="259.640388827" font-weight="normal">  control)</tspan><tspan x="586.085487289" y="275.640388827" font-weight="normal">- interactive visualizations              </tspan><tspan x="586.085487289" y="291.640388827" font-weight="normal">  (Matplotlib &amp; Open3D)</tspan><tspan x="586.085487289" y="307.640388827" font-weight="normal">- JSON data</tspan>         </text>
