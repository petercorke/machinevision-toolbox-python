             font-weight="bold"
             font-style="normal">
<tspan x="586.085487289" y="15.6403888269">Vision data &amp; geometry</tspan><tspan x="586.085487289" y="31.6403888269" font-weight="normal">- processed images</tspan><tspan x="586.085487289" y="47.6403888269" font-weight="normal">- features: blobs, SIFT, </tspan><tspan x="586.085487289" y="63.6403888269" font-weight="normal">  correspondences</tspan><tspan x="586.085487289" y="79.6403888269" font-weight="normal">- point clouds</tspan><tspan x="586.085487289" y="95.6403888269" font-weight="normal">- geometric models: camera </tspan><tspan x="586.085487289" y="111.640388827" font-weight="normal">  calibration, E &amp;F matrices,&#x20;</tspan><tspan x="586.085487289" y="127.640388827" font-weight="normal">  extrinsics</tspan><tspan x="586.085487289" y="143.640388827" font-weight="normal">- estimated poses</tspan>         </text>
      </g>
